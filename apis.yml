aid: loews
name: Loews Corporation
description: >-
  Loews Corporation is a diversified holding company with subsidiaries operating
  in commercial property and casualty insurance (CNA Financial), natural gas
  pipelines (Boardwalk Pipelines), packaging products (Altium Packaging), and
  hotels (Loews Hotels). Loews Corporation does not currently publish a public
  developer API or developer portal; this index tracks the company website and
  consumer-facing properties for reference.
